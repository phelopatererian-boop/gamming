<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sign in</title>
    <link rel="stylesheet" href="login - Copy.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="sign.html"> sign in</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <form action="../home/home.html" target="_self">
        <div class="login">
          <fieldset>
            <h2>login</h2>
            <label>
              Name
              <input required  class="Name" type="text" placeholder="Name" />
            </label>
            <label>
              Email
              <input required class="Email" type="email" placeholder="Email" />
            </label>

            <label>
              password
              <input
                required
                class="password"
                type="password"
                placeholder="password"
              />
              <!-- <button type="button">
              Show / Hide
            </button> -->
            </label>
            <label for="">
            <input class="submit" type="reset" />
            <input class="submit" type="submit" />
            </label>
          </fieldset>
        </div>
      </form>
    </main>
    <!-- <footer class="page__footer">
      <p>@elden</p>
    </footer> -->
    <!-- <script src="login - Copy.js"></script> -->
  </body>
</html>
