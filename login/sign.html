<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sign in</title>
    <link rel="stylesheet" href="login - Copy.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="login.html">  login</a></li>
        </ul>
      </nav>
    </header>
    <main>
<form action="index.html" target="_self">
      <div class="login">
        <fieldset>
          <h2>sign in</h2>
          <label>
            Name
            <input required class="Name" type="text" placeholder="Name" />
          </label>
          <label>
            Email
            <input required class="Email" type="email" placeholder="Email" />
          </label>
          <label>
            telephone
            <input required class="tel" type="tel" placeholder="telephone" />
          </label>
          <label>
            password
            <input required class="password" type="password" placeholder="password" />

          </label>
          <label for="">
            <input class="submit" type="reset" />
            <input class="submit" type="submit" />
            </label>
        </fieldset>
      </div>
      </form>
    </main>
    <!-- <script src="signin.js"></script> -->
  </body>
</html>
